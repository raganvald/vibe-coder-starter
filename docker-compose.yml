services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1        # Prevents unloading from memory
      - OLLAMA_LOAD_TIMEOUT=60m     # Allows time for 26B/31B model swapping
      - OLLAMA_FLASH_ATTENTION=1    # Optimizes processing for long prompts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_models:
